services:
  bot:
    build: .
    container_name: crypto-bot
    env_file: .env
    volumes:
      - ./data/portfolio.db:/app/data/portfolio.db
      - ./config:/app/config
      - ./logs:/app/logs
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
