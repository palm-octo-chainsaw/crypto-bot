name: Deploy

on:
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            a77878123/crypto-bot:${{ github.event.release.tag_name }}
            a77878123/crypto-bot:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Pull and restart
        run: |
          docker pull a77878123/crypto-bot:latest
          cd /home/peter/crypto-bot && docker compose down && docker compose up -d
