name: Docker Publish

on:
  push:
    tags: ["v*.*.*"]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      version:
        description: "Tag to publish (e.g. v1.5.0)"
        required: true

jobs:
  publish:
    # Skip PRs from forks: secrets aren't available to forked PR runs.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "extra_tag=" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "extra_tag=a77878123/crypto-bot:latest" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "extra_tag=a77878123/crypto-bot:latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: VERSION=${{ steps.version.outputs.value }}
          tags: |
            a77878123/crypto-bot:${{ steps.version.outputs.value }}
            ${{ steps.version.outputs.extra_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: publish
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: self-hosted
    steps:
      - name: Roll out new image to k8s
        env:
          VERSION: ${{ needs.publish.outputs.version }}
          KUBECONFIG: /etc/rancher/k3s/k3s.yaml
        run: |
          sudo -n k3s kubectl -n default set image deployment/crypto-bot \
            bot=a77878123/crypto-bot:"$VERSION"
          sudo -n k3s kubectl -n default rollout status deployment/crypto-bot --timeout=180s

      - name: Verify container status
        env:
          KUBECONFIG: /etc/rancher/k3s/k3s.yaml
        run: |
          KC="sudo -n k3s kubectl -n default"
          attempts=3
          # The pipeline ends here. Poll the container status up to $attempts
          # times so a transient not-ready read can't fail an otherwise healthy
          # deploy (and so a container that crashes just after coming up is still
          # caught). Pass on the first healthy read; fail only if all attempts do.
          for i in $(seq 1 "$attempts"); do
            $KC get pods -l app=crypto-bot -o wide
            phase=$($KC get pod -l app=crypto-bot -o jsonpath='{.items[0].status.phase}')
            ready=$($KC get pod -l app=crypto-bot -o jsonpath='{.items[0].status.containerStatuses[0].ready}')
            echo "attempt $i/$attempts: phase=$phase ready=$ready"
            if [ "$phase" = "Running" ] && [ "$ready" = "true" ]; then
              echo "Deploy successful: crypto-bot is Running and ready."
              exit 0
            fi
            [ "$i" -lt "$attempts" ] && sleep 10
          done
          echo "::error::crypto-bot did not reach a successful state after $attempts checks (phase=$phase ready=$ready)"
          exit 1
