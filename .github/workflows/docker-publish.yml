name: Docker Publish

on:
  push:
    tags: ["v*.*.*"]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      version:
        description: "Tag to publish (e.g. v1.5.0)"
        required: true

jobs:
  publish:
    # Skip PRs from forks: secrets aren't available to forked PR runs.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            short_sha=$(git rev-parse --short "${{ github.event.pull_request.head.sha }}")
            echo "value=pr-${{ github.event.pull_request.number }}-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "extra_tag=" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "extra_tag=a77878123/crypto-bot:latest" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "extra_tag=a77878123/crypto-bot:latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: VERSION=${{ steps.version.outputs.value }}
          tags: |
            a77878123/crypto-bot:${{ steps.version.outputs.value }}
            ${{ steps.version.outputs.extra_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
