# crypto-bot Deployment.
#
# The bot is outbound-only (Telegram long-poll + exchange/RPC APIs), so there
# is no Service/Ingress. Exactly ONE instance may poll the Telegram token at a
# time, so:
#   - replicas: 1
#   - strategy: Recreate  (a RollingUpdate would briefly run two pods, causing
#                          Telegram getUpdates 409 conflicts)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-bot
  namespace: default
  labels:
    app: crypto-bot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: crypto-bot
  template:
    metadata:
      labels:
        app: crypto-bot
    spec:
      # Seed a safe fallback targets.json so an empty config volume can never
      # crash-loop the bot (load_json has no missing-file fallback). The real
      # targets are seeded into the PVC at cutover; this only fires if absent.
      initContainers:
        - name: seed-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - '[ -f /config/targets.json ] || echo "{\"USDC\": 100.0}" > /config/targets.json'
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: bot
          image: a77878123/crypto-bot:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: crypto-bot-secret
          volumeMounts:
            - name: config
              mountPath: /app/config
            - name: trw-session
              mountPath: /app/.trw_session
            - name: logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi  # headroom for the Playwright/Chromium scrape
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: crypto-bot-config
        - name: trw-session
          persistentVolumeClaim:
            claimName: crypto-bot-trw-session
        - name: logs
          emptyDir: {}
