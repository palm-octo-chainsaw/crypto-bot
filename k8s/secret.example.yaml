# Template for the bot's runtime secret. DO NOT commit real values.
# Matches the cluster convention (cf. postgres-secret): a plain Opaque secret
# consumed via envFrom in the Deployment.
#
# At cutover, create the real secret from the existing .env plus DATABASE_URL,
# e.g.:
#
#   kubectl create secret generic crypto-bot-secret \
#     --from-env-file=.env \
#     --from-literal=DATABASE_URL="postgresql://<user>:<pass>@postgres:5432/cryptobot"
#
# DATABASE_URL reuses the postgres superuser (from postgres-secret) and points
# at a dedicated `cryptobot` database on the in-cluster headless service
# `postgres:5432`.
apiVersion: v1
kind: Secret
metadata:
  name: crypto-bot-secret
  namespace: default
type: Opaque
stringData:
  BOT_TOKEN: "REPLACE_ME"
  CHAT_ID: "REPLACE_ME"
  BINANCE_API_KEY: "REPLACE_ME"
  BINANCE_API_SECRET: "REPLACE_ME"
  KRAKEN_API_KEY: "REPLACE_ME"
  KRAKEN_API_SECRET: "REPLACE_ME"
  META_MASK: "REPLACE_ME"
  TRW_EMAIL: "REPLACE_ME"
  TRW_PASSWORD: "REPLACE_ME"
  TRW_TOTP_SECRET: "REPLACE_ME"
  HYPERLIQUID_PRIVATE_KEY: "REPLACE_ME"
  HYPERLIQUID_ACCOUNT_ADDRESS: "REPLACE_ME"
  MIN_TRADE_USD: "1.0"
  REBALANCE_RESERVE_PCT: "0.5"
  DATABASE_URL: "postgresql://USER:PASS@postgres:5432/cryptobot"
