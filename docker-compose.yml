services:
  bot:
    image: a77878123/crypto-bot:${VERSION:-v1.5.0}
    container_name: crypto-bot
    env_file: .env
    environment:
      APP_VERSION: ${VERSION:-v1.5.0}
    volumes:
      - ./data/portfolio.db:/app/data/portfolio.db
      - ./config:/app/config
      - ./logs:/app/logs
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
